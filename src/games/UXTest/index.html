<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyKinemeGame</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; background: black; overflow: hidden; touch-action: none; user-select: none; }
        canvas { width: 100%; height: 100%; object-fit: contain; image-rendering: pixelated; opacity: 0; transition: opacity 0.5s; }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-family: monospace; font-size: 1.5rem; font-weight: bold; letter-spacing: 2px; }
        #transitionOverlay { position: absolute; inset: 0; z-index: 200; background-color: black; display: none; pointer-events: none; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@msgpack/msgpack@3.0.0/dist.umd/msgpack.min.js"></script>
</head>
<body>
    <div id="loading">COMPILING GAME...</div>
    <div id="transitionOverlay"></div>
    <canvas id="gameCanvas"></canvas>
    <script src="engine.js"></script>
</body>
</html>
